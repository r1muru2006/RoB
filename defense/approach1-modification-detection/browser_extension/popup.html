<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>RoB Defender</h1>
    <p class="subtitle">Malicious Modification Detection</p>
  </div>

  <div class="stats">
    <div class="stat-card blocked">
      <span class="stat-number" id="blockedCount">0</span>
      <span class="stat-label">Blocked</span>
    </div>
    <div class="stat-card allowed">
      <span class="stat-number" id="allowedCount">0</span>
      <span class="stat-label">Allowed</span>
    </div>
  </div>

  <div class="settings">
    <h2>Detection Thresholds</h2>
    <div class="setting-row">
      <label for="entropyThreshold">Entropy change threshold:</label>
      <input type="number" id="entropyThreshold" step="0.1" value="3.0">
    </div>
    <div class="setting-row">
      <label for="sizeThreshold">Size change threshold (%):</label>
      <input type="number" id="sizeThreshold" step="1" value="5">
    </div>
    <button id="saveSettings">Save Settings</button>
  </div>

  <div class="alerts">
    <h2>Recent Alerts</h2>
    <div id="alertList"></div>
  </div>

  <div class="footer">
    <p>Based on USENIX Security 2023 paper</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
